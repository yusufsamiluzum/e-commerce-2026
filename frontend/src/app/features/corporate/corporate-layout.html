<main class="flex-1 min-w-0 min-h-0 flex flex-col overflow-y-auto bg-ember-50">

  @if (showBackButton()) {
    <div class="px-4 sm:px-6 lg:px-8 pt-5 max-w-7xl mx-auto w-full">
      <a routerLink="/corporate/profile/details"
        class="inline-flex items-center gap-1.5 text-sm text-stone-400 hover:text-ember-500 transition-colors group">
        <svg class="w-4 h-4 transition-transform group-hover:-translate-x-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
        </svg>
        Profil
      </a>
    </div>
  }
