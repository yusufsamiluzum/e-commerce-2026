<div
  [routerLink]="['/catalog', product.id]"
  class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden hover:shadow-lg transition-shadow duration-300 relative group cursor-pointer"
>
  @if (product.badge) {
    <div
      class="absolute top-3 left-3 z-10 text-xs font-bold px-2 py-0.5 rounded text-white"
      [class.bg-blue-500]="product.badge.type === 'new'"
      [class.bg-red-500]="product.badge.type === 'discount'"
    >
      {{ product.badge.text }}
    </div>
  }


  <div class="h-48 w-full bg-gray-50 flex items-center justify-center overflow-hidden relative">
    <img
      [src]="product.imageUrl || fallbackImage"
      (error)="onImageError($event)"
      [alt]="product.name"
      class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
    />
    <div
      class="absolute inset-x-0 bottom-0 flex justify-center pb-3
             translate-y-full group-hover:translate-y-0
             transition-transform duration-300 ease-out"
    >
      <button
        (click)="addToCart($event)"
        class="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-bold text-white shadow-lg
               active:scale-95 transition-all duration-200"
        style="background: linear-gradient(135deg, #0d9488, #0891b2);"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-4 w-4"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"
          />
        </svg>
        Sepete Ekle
      </button>
    </div>
  </div>

  <div class="p-4">
    <p class="text-xs text-gray-500 mb-1">{{ product.category }}</p>
    <h3 class="font-semibold text-gray-900 mb-2 truncate" [title]="product.name">
      {{ product.name }}
    </h3>

    <div class="flex items-center gap-1 mb-3">
      @for (star of stars; track star) {
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-4 w-4"
          [class.text-yellow-400]="star <= product.rating"
          [class.text-gray-200]="star > product.rating"
          viewBox="0 0 20 20"
          fill="currentColor"
        >
          <path
            d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"
          />
        </svg>
      }
      <span class="text-sm text-gray-700 font-medium ml-1">{{ product.rating }}</span>
      <span class="text-xs text-gray-400">({{ product.reviewCount }})</span>
    </div>

    <div class="flex items-center gap-2">
      <span class="text-lg font-bold text-gray-900">${{ product.price }}</span>
      @if (product.originalPrice) {
        <span class="text-sm text-gray-400 line-through">${{ product.originalPrice }}</span>
      }
    </div>
  </div>
</div>
