<div class="container mx-auto px-4 py-8 max-w-7xl">
  <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
    <h1 class="text-2xl font-bold text-gray-900">Our Products</h1>

    <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
      <div class="relative w-full sm:w-64">
        <span class="absolute inset-y-0 left-3 flex items-center text-gray-400">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
            />
          </svg>
        </span>
        <input
          type="text"
          placeholder="Search products..."
          class="pl-9 pr-4 py-2 w-full border border-gray-100 rounded-lg bg-gray-50 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow"
        />
      </div>

      <select
        class="px-4 py-2 border border-gray-100 rounded-lg bg-gray-50 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer"
      >
        <option value="">All Categories</option>
        <option value="electronics">Electronics</option>
        <option value="accessories">Accessories</option>
        <option value="footwear">Footwear</option>
        <option value="bags">Bags</option>
      </select>

      <select
        class="px-4 py-2 border border-gray-100 rounded-lg bg-gray-50 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer"
      >
        <option value="featured">Featured</option>
        <option value="newest">Newest</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
      </select>
    </div>
  </div>

  @if (products$ | async; as products) {
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      @for (product of products; track product.id) {
        <app-product-card [product]="product"></app-product-card>
      } @empty {
        <div class="col-span-full py-20 text-center text-gray-500">
          <p class="text-lg">No products found matching your criteria.</p>
        </div>
      }
    </div>
  } @else {
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      @for (i of [1, 2, 3, 4, 5, 6, 7, 8]; track i) {
        <div class="bg-white rounded-xl border border-gray-100 h-[340px] animate-pulse">
          <div class="h-48 bg-gray-200 w-full rounded-t-xl"></div>
          <div class="p-4 space-y-3 mt-2">
            <div class="h-3 bg-gray-200 rounded w-1/4"></div>
            <div class="h-4 bg-gray-200 rounded w-3/4"></div>
            <div class="h-3 bg-gray-200 rounded w-1/2"></div>
            <div class="h-5 bg-gray-200 rounded w-1/3 mt-4"></div>
          </div>
        </div>
      }
    </div>
  }
</div>
