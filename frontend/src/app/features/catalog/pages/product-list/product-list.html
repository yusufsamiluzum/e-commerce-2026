<div class="container mx-auto px-4 py-8 max-w-7xl">

  <div class="flex flex-col lg:flex-row gap-6">

    <!-- ── Sol Filtre Paneli ─────────────────────────────────── -->
    <aside class="w-full lg:w-64 flex-shrink-0">
      <div class="bg-white rounded-xl border border-stone-200 overflow-hidden sticky top-28 max-h-[calc(100vh-8rem)] overflow-y-auto">

        <app-category
          [categories]="(categories$ | async) || []"
          [selectedCategoryId]="filters.categoryId"
          (categorySelected)="onCategorySelect($event)">
        </app-category>

        <div class="border-t border-stone-100 mx-5"></div>

        <app-filter
          [searchQuery]="filters.search"
          [minPrice]="filters.minPrice"
          [maxPrice]="filters.maxPrice"
          [sortBy]="filters.sort"
          (filterChanged)="onFiltersChange($event)">
        </app-filter>

      </div>
    </aside>

    <!-- ── Ana İçerik ──────────────────────────────────────── -->
    <main class="flex-1 min-w-0">

      <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-medium text-stone-900">Tüm Ürünler</h1>
      </div>

      @if (products$ | async; as products) {

        @if (products.length > 0) {
          <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-5">
            @for (product of products; track product.id) {
              <app-product-card [product]="product"></app-product-card>
            }
          </div>
        } @else {
          <div class="flex flex-col items-center justify-center py-20 bg-white rounded-xl border border-stone-200 text-center px-6">
            <div class="w-14 h-14 rounded-full bg-ember-50 flex items-center justify-center mb-4">
              <svg class="w-6 h-6 text-ember-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
              </svg>
            </div>
            <h3 class="text-base font-medium text-stone-900 mb-1">Ürün bulunamadı</h3>
            <p class="text-sm text-stone-500">Arama kriterlerinize uygun ürün bulunamadı. Filtreleri değiştirmeyi deneyin.</p>
          </div>
        }

      } @else {
        <!-- Skeleton yüklenirken -->
        <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-5">
          @for (i of [1, 2, 3, 4, 5, 6]; track i) {
            <div class="bg-white rounded-xl border border-stone-200 overflow-hidden">
              <div class="h-48 bg-stone-100 animate-pulse"></div>
              <div class="p-4 space-y-3">
                <div class="h-3 bg-stone-100 animate-pulse rounded w-1/3"></div>
                <div class="h-4 bg-stone-100 animate-pulse rounded w-3/4"></div>
                <div class="h-3 bg-stone-100 animate-pulse rounded w-1/2"></div>
                <div class="h-5 bg-stone-100 animate-pulse rounded w-1/4 mt-2"></div>
              </div>
            </div>
          }
        </div>
      }

    </main>

  </div>
</div>
