<div class="mt-4">
  <label class="block text-sm font-medium text-gray-700 mb-2">Kart Bilgileri</label>
  <div class="p-3 border border-gray-300 rounded-md shadow-sm bg-white" #cardElement></div>
  <p class="mt-2 text-xs text-gray-500 flex items-center">
    <svg class="h-4 w-4 text-green-500 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
    </svg>
    256-bit SSL korumalı güvenli ödeme (Stripe)
  </p>
  <p *ngIf="errorMessage" class="mt-2 text-sm text-red-600">{{errorMessage}}</p>

  <!-- Demo test kartı -->
  @if (!isProd) {
  <div class="mt-3 p-3 bg-amber-50 border border-amber-200 rounded-lg">
    <p class="text-[10px] font-semibold text-amber-600 uppercase tracking-widest mb-2">Test Kartı</p>
    <div class="grid grid-cols-3 gap-x-4 gap-y-1">
      <div class="col-span-3">
        <span class="text-[10px] text-stone-400">Kart No</span>
        <p class="font-mono text-xs font-semibold text-stone-700 tracking-widest">4242 4242 4242 4242</p>
      </div>
      <div>
        <span class="text-[10px] text-stone-400">Son Kullanma</span>
        <p class="font-mono text-xs font-semibold text-stone-700">12/34</p>
      </div>
      <div>
        <span class="text-[10px] text-stone-400">CVC</span>
        <p class="font-mono text-xs font-semibold text-stone-700">123</p>
      </div>
      <div>
        <span class="text-[10px] text-stone-400">ZIP</span>
        <p class="font-mono text-xs font-semibold text-stone-700">34000</p>
      </div>
    </div>
  </div>
  }
</div>
