<div class="min-h-screen bg-ember-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <!-- Logo -->
    <a routerLink="/" class="flex items-center justify-center gap-2 mb-6">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-orange-500 to-red-600 flex items-center justify-center shadow-sm">
        <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12.017 2C12.017 2 6 8 6 13.5a6.017 6.017 0 0 0 12 0C18 8 12.017 2 12.017 2zm-.017 15a2 2 0 0 1-2-2c0-1.5 1-3 2-4 1 1 2 2.5 2 4a2 2 0 0 1-2 2z"/>
        </svg>
      </div>
      <span class="text-xl font-semibold text-stone-900 tracking-tight">ember</span>
    </a>
    <h2 class="text-center text-2xl font-bold text-stone-900">Giriş Yapın</h2>
    <p class="mt-2 text-center text-sm text-stone-500">
      E-ticaret deneyimine kaldığınız yerden devam edin
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow-sm sm:rounded-2xl sm:px-10 border border-stone-200">

      <!-- Tabs -->
      <div class="flex border-b border-stone-200 mb-6">
        <button (click)="switchTab('individual')"
          [class.border-ember-500]="activeTab === 'individual'"
          [class.text-ember-500]="activeTab === 'individual'"
          [class.border-transparent]="activeTab !== 'individual'"
          class="flex-1 py-3 text-sm font-medium text-center border-b-2 transition-colors text-stone-400 hover:text-stone-700 focus:outline-none">
          Bireysel Müşteri
        </button>
        <button (click)="switchTab('corporate')"
          [class.border-stone-900]="activeTab === 'corporate'"
          [class.text-stone-900]="activeTab === 'corporate'"
          [class.border-transparent]="activeTab !== 'corporate'"
          class="flex-1 py-3 text-sm font-medium text-center border-b-2 transition-colors text-stone-400 hover:text-stone-700 focus:outline-none">
          Kurumsal Satıcı
        </button>
      </div>

      <!-- Error Alert -->
      <div *ngIf="errorMsg" class="mb-5 bg-red-50 p-4 rounded-xl flex items-start gap-2 border border-red-100">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-400 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span class="text-sm font-medium text-red-700">{{ errorMsg }}</span>
      </div>

      <!-- Individual Form -->
      <form *ngIf="activeTab === 'individual'" [formGroup]="individualForm" (ngSubmit)="onSubmit()" class="space-y-5">
        <div>
          <label for="ind-email" class="block text-sm font-medium text-stone-700 mb-1.5">E-posta Adresi</label>
          <input id="ind-email" formControlName="email" type="email" autocomplete="email"
            class="appearance-none block w-full px-4 py-3 border border-stone-200 rounded-xl bg-stone-50 placeholder-stone-400 text-stone-900 focus:outline-none focus:ring-2 focus:ring-ember-500/20 focus:border-ember-500 sm:text-sm transition-all">
        </div>

        <div>
          <label for="ind-password" class="block text-sm font-medium text-stone-700 mb-1.5">Şifre</label>
          <input id="ind-password" formControlName="password" type="password" autocomplete="current-password"
            class="appearance-none block w-full px-4 py-3 border border-stone-200 rounded-xl bg-stone-50 placeholder-stone-400 text-stone-900 focus:outline-none focus:ring-2 focus:ring-ember-500/20 focus:border-ember-500 sm:text-sm transition-all">
        </div>

        <button type="submit" [disabled]="individualForm.invalid || isLoading"
          class="w-full flex justify-center items-center gap-2 py-3 px-4 rounded-xl text-sm font-semibold text-white bg-ember-500 hover:bg-ember-600 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
          <svg *ngIf="isLoading" class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          {{ isLoading ? 'Giriş Yapılıyor...' : 'Giriş Yap' }}
        </button>
      </form>

      <!-- Corporate Form -->
      <form *ngIf="activeTab === 'corporate'" [formGroup]="corporateForm" (ngSubmit)="onSubmit()" class="space-y-5">
        <div>
          <label for="corp-email" class="block text-sm font-medium text-stone-700 mb-1.5">Kurumsal E-posta Adresi</label>
          <input id="corp-email" formControlName="email" type="email" autocomplete="email"
            class="appearance-none block w-full px-4 py-3 border border-stone-200 rounded-xl bg-stone-50 placeholder-stone-400 text-stone-900 focus:outline-none focus:ring-2 focus:ring-stone-900/10 focus:border-stone-700 sm:text-sm transition-all">
        </div>

        <div>
          <label for="corp-password" class="block text-sm font-medium text-stone-700 mb-1.5">Şifre</label>
          <input id="corp-password" formControlName="password" type="password" autocomplete="current-password"
            class="appearance-none block w-full px-4 py-3 border border-stone-200 rounded-xl bg-stone-50 placeholder-stone-400 text-stone-900 focus:outline-none focus:ring-2 focus:ring-stone-900/10 focus:border-stone-700 sm:text-sm transition-all">
        </div>

        <button type="submit" [disabled]="corporateForm.invalid || isLoading"
          class="w-full flex justify-center items-center gap-2 py-3 px-4 rounded-xl text-sm font-semibold text-white bg-stone-900 hover:bg-stone-800 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
          <svg *ngIf="isLoading" class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          {{ isLoading ? 'Giriş Yapılıyor...' : 'Kurumsal Giriş Yap' }}
        </button>
      </form>

      <!-- Footer link -->
      <p class="mt-6 text-center text-sm text-stone-400">
        Hesabınız yok mu?
        <a routerLink="/auth/register" class="font-medium text-ember-500 hover:text-ember-600 transition-colors">Kayıt Olun</a>
      </p>
    </div>

    <!-- Admin link -->
    <p class="mt-4 text-center text-xs text-stone-400">
      <a routerLink="/auth/admin/login" class="hover:text-stone-600 transition-colors">Yönetici girişi →</a>
    </p>
  </div>
</div>
