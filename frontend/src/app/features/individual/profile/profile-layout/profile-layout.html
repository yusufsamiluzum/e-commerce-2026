<div class="min-h-screen bg-[#FEF7ED]">
  <div class="container mx-auto px-4 py-6 md:py-10 max-w-7xl">
    <div class="flex flex-col md:flex-row gap-6">

      <!-- ── Sidebar ────────────────────────────────────────── -->
      <aside class="w-full md:w-64 flex-shrink-0">
        <div class="md:sticky md:top-24 bg-white border border-stone-200 rounded-xl overflow-hidden">

          <!-- Sidebar Başlığı (masaüstü) -->
          <div class="hidden md:flex items-center gap-3 px-5 py-5 border-b border-stone-100">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-orange-500 to-red-600 flex items-center justify-center flex-shrink-0 shadow-sm">
              <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12.017 2C12.017 2 6 8 6 13.5a6.017 6.017 0 0 0 12 0C18 8 12.017 2 12.017 2zm-.017 15a2 2 0 0 1-2-2c0-1.5 1-3 2-4 1 1 2 2.5 2 4a2 2 0 0 1-2 2z"/>
              </svg>
            </div>
            <div>
              <p class="text-sm font-medium text-stone-900">Hesabım</p>
              <span class="inline-flex items-center gap-1 mt-0.5 px-2 py-0.5 bg-orange-50 border border-orange-200 rounded-full text-[10px] font-medium text-orange-600">
                <span class="w-1.5 h-1.5 rounded-full bg-lime-500"></span>
                Bireysel Müşteri
              </span>
            </div>
          </div>

          <!-- Navigasyon -->
          <nav class="flex flex-row md:flex-col overflow-x-auto md:overflow-visible p-2 gap-0.5"
               style="scrollbar-width: none;">
            @for (item of menuItems; track item.path) {
              <button
                type="button"
                [routerLink]="'./' + item.path"
                routerLinkActive="ember-nav-active"
                [routerLinkActiveOptions]="{ exact: true }"
                class="nav-menu-item group flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-stone-500 hover:bg-stone-50 hover:text-stone-900 transition-all whitespace-nowrap min-w-max md:min-w-0 md:w-full border border-transparent">
                <span class="w-7 h-7 flex-shrink-0 rounded-md flex items-center justify-center bg-stone-100 group-hover:bg-orange-50 transition-colors">
                  <svg class="w-3.5 h-3.5 text-stone-400 group-hover:text-orange-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" [innerHTML]="item.icon"></svg>
                </span>
                <span class="hidden md:inline">{{ item.label }}</span>
              </button>
            }
          </nav>

        </div>
      </aside>

      <!-- ── Ana İçerik ─────────────────────────────────────── -->
      <main class="flex-1 min-w-0 profile-main">
        <router-outlet></router-outlet>
      </main>

    </div>
  </div>
</div>
