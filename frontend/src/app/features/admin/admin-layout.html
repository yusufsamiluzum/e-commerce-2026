<div class="flex min-h-[calc(100vh-var(--navbar-h,64px))]">

  <!-- ── Sol Koyu Sidebar ──────────────────────────────────────── -->
  <aside class="w-60 flex-shrink-0 bg-stone-900 flex flex-col sticky top-16 h-[calc(100vh-64px)] overflow-y-auto">

    <!-- Platform başlığı -->
    <div class="px-4 py-5 border-b border-stone-800">
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-orange-500 to-red-600 flex items-center justify-center flex-shrink-0 shadow-lg shadow-orange-900/40">
          <svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12.017 2C12.017 2 6 8 6 13.5a6.017 6.017 0 0 0 12 0C18 8 12.017 2 12.017 2zm-.017 15a2 2 0 0 1-2-2c0-1.5 1-3 2-4 1 1 2 2.5 2 4a2 2 0 0 1-2 2z"/>
          </svg>
        </div>
        <div>
          <p class="text-sm font-semibold text-white">ember</p>
          <p class="text-xs text-stone-400">Admin Paneli</p>
        </div>
      </div>
    </div>

    <!-- Navigasyon -->
    <nav class="flex-1 p-3 space-y-0.5">
      @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="bg-stone-800 text-white"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-stone-400 hover:bg-stone-800 hover:text-white transition-colors group"
        >
          <svg
            class="w-[18px] h-[18px] flex-shrink-0 group-[.bg-stone-800]:text-ember-500"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="1.75"
            [innerHTML]="item.icon"
          ></svg>
          {{ item.label }}
        </a>
      }
    </nav>

    <!-- Alt: admin kimliği + çıkış -->
    <div class="p-3 border-t border-stone-800">
      <div class="flex items-center gap-2.5 px-3 py-2 mb-1">
        <div class="w-7 h-7 rounded-full bg-red-600 flex items-center justify-center flex-shrink-0">
          <svg class="w-3.5 h-3.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
        </div>
        <div class="min-w-0 flex-1">
          <p class="text-xs font-medium text-stone-200 truncate">{{ auth.currentUserName() }}</p>
          <p class="text-[11px] text-stone-500 truncate">{{ auth.currentUserEmail() }}</p>
        </div>
      </div>
      <button
        (click)="logout()"
        class="w-full flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm text-stone-400 hover:bg-red-900/30 hover:text-red-400 transition-colors"
      >
        <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Çıkış Yap
      </button>
    </div>
  </aside>

  <!-- ── İçerik Alanı ───────────────────────────────────────── -->
  <main class="flex-1 min-w-0 min-h-0 flex flex-col overflow-y-auto bg-stone-100">
    <router-outlet></router-outlet>
  </main>

</div>
