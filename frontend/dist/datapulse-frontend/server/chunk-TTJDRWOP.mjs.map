<div class="container mx-auto px-4 py-8 mb-[50px] max-w-7xl">
  
  <div class="flex flex-col lg:flex-row gap-8">
    
    <!-- Sidebar -->
    <aside class="w-full lg:w-64 flex-shrink-0 flex flex-col space-y-6">
      
      <!-- Category Component -->
      <app-category 
        [categories]="(categories$ | async) || []"
        [selectedCategoryId]="filters.categoryId"
        (categorySelected)="onCategorySelect($event)">
      </app-category>

      <!-- Filter Component -->
      <app-filter
        [searchQuery]="filters.search"
        [minPrice]="filters.minPrice"
        [maxPrice]="filters.maxPrice"
        [sortBy]="filters.sort"
        (filterChanged)="onFiltersChange($event)">
      </app-filter>
      
    </aside>

    <!-- Main Content -->
    <main class="flex-1">
      <div class="flex justify-between items-end mb-6">
        <h1 class="text-2xl font-bold text-gray-900">Tüm Ürünler</h1>
      </div>

      @if (products$ | async; as products) {
        <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6">
          @for (product of products; track product.id) {
            <app-product-card [product]="product"></app-product-card>
          } @empty {
            <div class="col-span-full py-20 text-center bg-white rounded-xl shadow-sm border border-gray-100">
              <p class="text-lg text-gray-500">Arama kriterlerinize uygun ürün bulunamadı.</p>
            </div>
          }
        </div>
      } @else {
        <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6">
          @for (i of [1, 2, 3, 4, 5, 6]; track i) {
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 h-[340px] animate-pulse">
              <div class="h-48 bg-gray-200 w-full rounded-t-xl"></div>
              <div class="p-5 space-y-3 mt-2">
                <div class="h-3 bg-gray-200 rounded w-1/4"></div>
                <div class="h-4 bg-gray-200 rounded w-3/4"></div>
                <div class="h-3 bg-gray-200 rounded w-1/2"></div>
                <div class="h-5 bg-gray-200 rounded w-1/3 mt-4"></div>
              </div>
            </div>
          }
        </div>
      }
    </main>

  </div>
</div>
