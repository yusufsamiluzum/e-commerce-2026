<div class="mt-4">
  <label class="block text-sm font-medium text-gray-700 mb-2">Card Details</label>
  <div class="p-3 border border-gray-300 rounded-md shadow-sm bg-white" #cardElement></div>
  <p class="mt-2 text-xs text-gray-500 flex items-center">
    <svg class="h-4 w-4 text-green-500 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
    </svg>
    Payments are 100% secure and PCI compliant via Stripe.
  </p>
  <p *ngIf="errorMessage" class="mt-2 text-sm text-red-600">{{errorMessage}}</p>
</div>
