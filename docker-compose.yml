version: '3.8'

services:
  # 1. Database
  db:
    image: mysql:8.0
    container_name: e-commerce-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password123
      MYSQL_DATABASE: datapulse_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword123"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Database UI (phpMyAdmin)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: e-commerce-phpmyadmin
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: password123
    ports:
      - "8081:80"
    depends_on:
      db:
        condition: service_healthy

  # 2. Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: e-commerce-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/datapulse_db?createDatabaseIfNotExist=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=password123
    depends_on:
      db:
        condition: service_healthy

  # 3. Angular SSR Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: e-commerce-frontend
    ports:
      - "4200:4000"
    environment:
      - API_URL=http://backend:8080
    depends_on:
      - backend

volumes:
  db_data:
